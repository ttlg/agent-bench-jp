<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Generative Art Engine</title>
  <style>
    :root {
      --bg: #050711;
      --bg-2: #0e1530;
      --panel: rgba(8, 12, 24, 0.84);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #ebf6ff;
      --muted: rgba(235, 246, 255, 0.72);
      --accent: #61f4ff;
      --accent-2: #ff4fb8;
      --accent-3: #a2ff65;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 30%),
        radial-gradient(circle at 82% 12%, rgba(97, 244, 255, 0.12), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(290px, 340px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 20px 60px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0;
      font-size: 0.72rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .lede,
    .mode-copy,
    .mode-hint {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .panel-section {
      display: grid;
      gap: 10px;
    }

    .section-title {
      margin: 0;
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.56);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      padding: 12px 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition:
        transform 140ms ease,
        border-color 140ms ease,
        background 180ms ease,
        box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
    }

    button.active {
      border-color: rgba(255, 255, 255, 0.2);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 26%, transparent), rgba(255, 255, 255, 0.06));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04), 0 12px 28px rgba(0, 0, 0, 0.25);
    }

    button.secondary {
      padding: 11px 12px;
      border-radius: 14px;
    }

    .slider-wrap {
      display: grid;
      gap: 12px;
    }

    .slider-row {
      display: grid;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.95rem;
    }

    .slider-value {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent-2) 65%, var(--accent) 35%), var(--accent-3));
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.86);
      background: rgba(7, 12, 22, 0.96);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.86);
      background: rgba(7, 12, 22, 0.96);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.08);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stage-shell {
      position: relative;
      min-height: 62vh;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)),
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.06), transparent 28%);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      isolation: isolate;
    }

    .stage-shell::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      pointer-events: none;
      z-index: 1;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 62vh;
      touch-action: none;
      cursor: crosshair;
    }

    .footer-note {
      font-size: 0.84rem;
      color: rgba(255, 255, 255, 0.46);
      line-height: 1.5;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .stage-shell,
      svg {
        min-height: 56vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="panel-section">
        <p class="eyebrow">SVG Generative Engine</p>
        <h1>Reactive Geometry</h1>
        <p class="lede">単一ファイルの SVG アートエンジンです。ポインター操作で場を歪め、クリックで各モード固有のイベントを起動できます。</p>
      </div>

      <div class="panel-section">
        <p class="section-title">Modes</p>
        <div class="button-grid" id="modeButtons"></div>
        <p class="mode-copy" id="modeDescription"></p>
        <p class="mode-hint" id="modeHint"></p>
      </div>

      <div class="panel-section">
        <p class="section-title">Parameters</p>
        <div class="slider-wrap">
          <label class="slider-row" for="speedSlider">
            <span class="slider-label"><span id="speedLabel">速度</span><span class="slider-value" id="speedValue">50</span></span>
            <input id="speedSlider" type="range" min="0" max="100" value="62">
          </label>
          <label class="slider-row" for="densitySlider">
            <span class="slider-label"><span id="densityLabel">密度</span><span class="slider-value" id="densityValue">50</span></span>
            <input id="densitySlider" type="range" min="0" max="100" value="68">
          </label>
          <label class="slider-row" for="hueSlider">
            <span class="slider-label"><span id="hueLabel">色相</span><span class="slider-value" id="hueValue">50</span></span>
            <input id="hueSlider" type="range" min="0" max="100" value="54">
          </label>
        </div>
      </div>

      <div class="panel-section">
        <p class="section-title">Themes</p>
        <div class="theme-grid" id="themeButtons"></div>
      </div>

      <div class="panel-section">
        <p class="section-title">Transport</p>
        <div class="actions">
          <button class="secondary" id="playButton" type="button">Pause</button>
          <button class="secondary" id="resetButton" type="button">Reset</button>
        </div>
      </div>

      <p class="footer-note">ポインター移動で場を変形します。クリックは、フローならバースト、樹木なら再生成、波動なら波源の追加です。</p>
    </aside>

    <main class="stage-shell" id="stageShell">
      <svg id="artboard" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-label="Generative art canvas">
        <defs>
          <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop id="bgStop1" offset="0%" stop-color="#050711"></stop>
            <stop id="bgStop2" offset="100%" stop-color="#10172f"></stop>
          </linearGradient>
          <radialGradient id="orbGradient" cx="50%" cy="40%" r="60%">
            <stop id="orbStop1" offset="0%" stop-color="#61f4ff" stop-opacity="0.7"></stop>
            <stop id="orbStop2" offset="100%" stop-color="#61f4ff" stop-opacity="0"></stop>
          </radialGradient>
          <radialGradient id="vignetteGradient" cx="50%" cy="50%" r="66%">
            <stop offset="62%" stop-color="#000000" stop-opacity="0"></stop>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.54"></stop>
          </radialGradient>
          <pattern id="dotPattern" width="34" height="34" patternUnits="userSpaceOnUse">
            <circle id="patternDot" cx="1.5" cy="1.5" r="1.2" fill="rgba(255,255,255,0.06)"></circle>
          </pattern>
          <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.8" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
          <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="5.5" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
        </defs>
        <rect id="bgRect" x="0" y="0" width="1200" height="800" fill="url(#bgGradient)"></rect>
        <rect id="patternRect" x="0" y="0" width="1200" height="800" fill="url(#dotPattern)" opacity="0.36"></rect>
        <g id="backgroundLayer"></g>
        <g id="modeLayer"></g>
        <rect id="vignetteRect" x="0" y="0" width="1200" height="800" fill="url(#vignetteGradient)"></rect>
      </svg>
    </main>
  </div>

  <script>
    (() => {
      const SVG_NS = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("artboard");
      const modeLayer = document.getElementById("modeLayer");
      const backgroundLayer = document.getElementById("backgroundLayer");
      const stageShell = document.getElementById("stageShell");
      const playButton = document.getElementById("playButton");
      const resetButton = document.getElementById("resetButton");
      const modeButtonsHost = document.getElementById("modeButtons");
      const themeButtonsHost = document.getElementById("themeButtons");
      const modeDescription = document.getElementById("modeDescription");
      const modeHint = document.getElementById("modeHint");

      const sliderEls = {
        speed: document.getElementById("speedSlider"),
        density: document.getElementById("densitySlider"),
        hue: document.getElementById("hueSlider")
      };

      const sliderLabels = {
        speed: document.getElementById("speedLabel"),
        density: document.getElementById("densityLabel"),
        hue: document.getElementById("hueLabel")
      };

      const sliderValues = {
        speed: document.getElementById("speedValue"),
        density: document.getElementById("densityValue"),
        hue: document.getElementById("hueValue")
      };

      const bgRect = document.getElementById("bgRect");
      const patternRect = document.getElementById("patternRect");
      const vignetteRect = document.getElementById("vignetteRect");
      const bgStop1 = document.getElementById("bgStop1");
      const bgStop2 = document.getElementById("bgStop2");
      const orbStop1 = document.getElementById("orbStop1");
      const orbStop2 = document.getElementById("orbStop2");
      const patternDot = document.getElementById("patternDot");

      const themes = {
        neon: {
          name: "Neon",
          bg: "#050711",
          bg2: "#10172f",
          panel: "rgba(6, 10, 20, 0.84)",
          text: "#eef7ff",
          muted: "rgba(238, 247, 255, 0.72)",
          palette: [
            { h: 186, s: 96, l: 66 },
            { h: 323, s: 92, l: 66 },
            { h: 88, s: 92, l: 64 }
          ]
        },
        pastel: {
          name: "Pastel",
          bg: "#111523",
          bg2: "#202842",
          panel: "rgba(17, 21, 35, 0.84)",
          text: "#f7f5ff",
          muted: "rgba(247, 245, 255, 0.72)",
          palette: [
            { h: 190, s: 76, l: 78 },
            { h: 344, s: 80, l: 78 },
            { h: 52, s: 84, l: 78 }
          ]
        },
        mono: {
          name: "Mono",
          bg: "#050505",
          bg2: "#161616",
          panel: "rgba(12, 12, 12, 0.82)",
          text: "#f4f4f4",
          muted: "rgba(244, 244, 244, 0.66)",
          palette: [
            { h: 0, s: 0, l: 92 },
            { h: 0, s: 0, l: 68 },
            { h: 0, s: 0, l: 36 }
          ]
        }
      };

      const state = {
        width: 1200,
        height: 800,
        time: 0,
        lastTs: 0,
        playing: true,
        mode: "flow",
        theme: "neon",
        params: {
          speed: sliderEls.speed.value / 100,
          density: sliderEls.density.value / 100,
          hue: sliderEls.hue.value / 100
        },
        pointer: {
          x: 600,
          y: 400,
          inside: false
        }
      };

      let resizeTicket = 0;
      let currentMode = null;

      const modeMeta = {
        flow: {
          label: "Particle Flow",
          description: "数百の粒子がトリグ関数ベースのフローフィールドを循環し、軌跡を残しながらフェードします。",
          hint: "クリックでバーストを発生させます。",
          sliders: {
            speed: "流速",
            density: "粒子密度",
            hue: "スペクトル"
          }
        },
        tree: {
          label: "Fractal Tree",
          description: "再帰的な枝を毎フレーム再構築し、ポインターを風向として扱うことで樹冠を揺らします。",
          hint: "クリック位置から新しい樹木を生成します。",
          sliders: {
            speed: "風速",
            density: "枝の深さ",
            hue: "葉色"
          }
        },
        waves: {
          label: "Wave Interference",
          description: "複数の波源からの位相差をサンプル格子へ反映し、干渉パターンと同心円リップルを重ねます。",
          hint: "クリックで波源を追加します。",
          sliders: {
            speed: "伝播速度",
            density: "波密度",
            hue: "彩度偏移"
          }
        }
      };

      function svgEl(tag, attrs = {}) {
        const node = document.createElementNS(SVG_NS, tag);
        setAttrs(node, attrs);
        return node;
      }

      function setAttrs(node, attrs) {
        for (const [key, value] of Object.entries(attrs)) {
          if (value !== undefined && value !== null) {
            node.setAttribute(key, value);
          }
        }
      }

      function clear(node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function hueValue(index, hueShift = 0) {
        const palette = themes[state.theme].palette;
        const swatch = palette[(index % palette.length + palette.length) % palette.length];
        return ((swatch.h + hueShift) % 360 + 360) % 360;
      }

      function themeColor(index, alpha = 1, hueShift = 0, saturationScale = 1, lightnessScale = 1) {
        const palette = themes[state.theme].palette;
        const swatch = palette[(index % palette.length + palette.length) % palette.length];
        const hue = hueValue(index, hueShift);
        const saturation = clamp(swatch.s * saturationScale, 0, 100);
        const lightness = clamp(swatch.l * lightnessScale, 0, 100);
        return "hsla(" + hue + ", " + saturation + "%, " + lightness + "%, " + alpha + ")";
      }

      function updatePointer(clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        const localX = ((clientX - rect.left) / rect.width) * state.width;
        const localY = ((clientY - rect.top) / rect.height) * state.height;
        state.pointer.x = clamp(localX, 0, state.width);
        state.pointer.y = clamp(localY, 0, state.height);
      }

      function pseudoNoise(seed) {
        const x = Math.sin(seed * 12.9898) * 43758.5453;
        return x - Math.floor(x);
      }

      function refreshIfPaused() {
        if (state.playing || !currentMode) {
          return;
        }
        currentMode.update(1 / 60, performance.now());
      }

      function setTheme(name) {
        state.theme = name;
        const theme = themes[name];
        document.documentElement.style.setProperty("--bg", theme.bg);
        document.documentElement.style.setProperty("--bg-2", theme.bg2);
        document.documentElement.style.setProperty("--panel", theme.panel);
        document.documentElement.style.setProperty("--text", theme.text);
        document.documentElement.style.setProperty("--muted", theme.muted);
        document.documentElement.style.setProperty("--accent", themeColor(0));
        document.documentElement.style.setProperty("--accent-2", themeColor(1));
        document.documentElement.style.setProperty("--accent-3", themeColor(2));
        document.documentElement.style.setProperty("--shadow", name === "mono" ? "rgba(0,0,0,0.58)" : "rgba(0,0,0,0.38)");
        bgStop1.setAttribute("stop-color", theme.bg);
        bgStop2.setAttribute("stop-color", theme.bg2);
        orbStop1.setAttribute("stop-color", themeColor(0, 0.74));
        orbStop2.setAttribute("stop-color", themeColor(0, 0));
        patternDot.setAttribute("fill", themeColor(0, name === "mono" ? 0.08 : 0.12));
        syncThemeButtons();
        buildBackground();
        refreshIfPaused();
      }

      function buildBackground() {
        clear(backgroundLayer);
        const haloA = svgEl("circle", {
          cx: state.width * 0.18,
          cy: state.height * 0.22,
          r: Math.min(state.width, state.height) * 0.18,
          fill: "url(#orbGradient)",
          opacity: 0.22
        });
        const haloB = svgEl("circle", {
          cx: state.width * 0.84,
          cy: state.height * 0.16,
          r: Math.min(state.width, state.height) * 0.14,
          fill: themeColor(1, 0.13, state.params.hue * 90),
          filter: "url(#glowStrong)"
        });
        const haze = svgEl("ellipse", {
          cx: state.width * 0.55,
          cy: state.height * 0.78,
          rx: state.width * 0.34,
          ry: state.height * 0.18,
          fill: themeColor(2, 0.08, -30),
          filter: "url(#glowStrong)"
        });
        backgroundLayer.append(haloA, haloB, haze);
        for (let i = 0; i < 24; i += 1) {
          const dot = svgEl("circle", {
            cx: state.width * pseudoNoise(i * 2.1 + 1.3),
            cy: state.height * pseudoNoise(i * 4.4 + 7.7),
            r: 1 + pseudoNoise(i * 3.2 + 4.7) * 2.4,
            fill: themeColor(i, 0.18, i * 11),
            opacity: 0.9
          });
          backgroundLayer.appendChild(dot);
        }
      }

      function updateDimensions() {
        const rect = stageShell.getBoundingClientRect();
        state.width = Math.max(640, Math.round(rect.width));
        state.height = Math.max(480, Math.round(rect.height));
        svg.setAttribute("viewBox", "0 0 " + state.width + " " + state.height);
        [bgRect, patternRect, vignetteRect].forEach((node) => {
          setAttrs(node, { width: state.width, height: state.height });
        });
        state.pointer.x = state.width * 0.5;
        state.pointer.y = state.height * 0.5;
        buildBackground();
        if (currentMode && currentMode.reset) {
          currentMode.reset();
        }
      }

      function queueResize() {
        cancelAnimationFrame(resizeTicket);
        resizeTicket = requestAnimationFrame(updateDimensions);
      }

      function renderSliderUI() {
        sliderValues.speed.textContent = Math.round(state.params.speed * 100);
        sliderValues.density.textContent = Math.round(state.params.density * 100);
        sliderValues.hue.textContent = Math.round(state.params.hue * 100);
        const meta = modeMeta[state.mode];
        sliderLabels.speed.textContent = meta.sliders.speed;
        sliderLabels.density.textContent = meta.sliders.density;
        sliderLabels.hue.textContent = meta.sliders.hue;
        modeDescription.textContent = meta.description;
        modeHint.textContent = meta.hint;
      }

      function syncModeButtons() {
        [...modeButtonsHost.querySelectorAll("button")].forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === state.mode);
        });
      }

      function syncThemeButtons() {
        [...themeButtonsHost.querySelectorAll("button")].forEach((button) => {
          button.classList.toggle("active", button.dataset.theme === state.theme);
        });
      }

      function setMode(name) {
        state.mode = name;
        if (currentMode && currentMode.unmount) {
          currentMode.unmount();
        }
        clear(modeLayer);
        currentMode = modes[name];
        currentMode.mount();
        syncModeButtons();
        renderSliderUI();
        refreshIfPaused();
      }

      function bindControls() {
        Object.entries(sliderEls).forEach(([key, slider]) => {
          slider.addEventListener("input", () => {
            state.params[key] = slider.value / 100;
            renderSliderUI();
            if (currentMode && currentMode.onParamChange) {
              currentMode.onParamChange(key);
            }
            refreshIfPaused();
          });
        });

        playButton.addEventListener("click", () => {
          state.playing = !state.playing;
          playButton.textContent = state.playing ? "Pause" : "Play";
          if (!state.playing) {
            refreshIfPaused();
          }
        });

        resetButton.addEventListener("click", () => {
          if (currentMode && currentMode.reset) {
            currentMode.reset();
          }
          refreshIfPaused();
        });

        svg.addEventListener("pointermove", (event) => {
          state.pointer.inside = true;
          updatePointer(event.clientX, event.clientY);
          if (currentMode && currentMode.onPointerMove) {
            currentMode.onPointerMove();
          }
          refreshIfPaused();
        });

        svg.addEventListener("pointerleave", () => {
          state.pointer.inside = false;
          refreshIfPaused();
        });

        svg.addEventListener("pointerdown", (event) => {
          state.pointer.inside = true;
          updatePointer(event.clientX, event.clientY);
          if (currentMode && currentMode.click) {
            currentMode.click(state.pointer.x, state.pointer.y);
          }
          refreshIfPaused();
        });

        window.addEventListener("resize", queueResize);
        new ResizeObserver(queueResize).observe(stageShell);
      }

      function createFlowMode() {
        const root = svgEl("g", { "mix-blend-mode": "screen" });
        const halo = svgEl("circle", { filter: "url(#glowStrong)" });
        const trailGroup = svgEl("g", { filter: "url(#glowSoft)" });
        const burstGroup = svgEl("g", { filter: "url(#glowSoft)" });
        const particleGroup = svgEl("g", { filter: "url(#glowStrong)" });
        root.append(halo, trailGroup, burstGroup, particleGroup);

        let flowClock = 0;
        let particles = [];
        let trails = [];
        let bursts = [];
        let trailCursor = 0;

        function flowAngle(x, y, time, seed) {
          const nx = x * 0.0046;
          const ny = y * 0.0048;
          const wobble =
            Math.sin(nx * 1.7 + time * 0.55 + seed) +
            Math.cos(ny * 1.35 - time * 0.45 - seed) +
            Math.sin((nx + ny) * 1.05 + time * 0.33);
          return wobble * 1.55 + Math.sin(ny * 2.4 - nx * 0.8 + time * 0.25);
        }

        function makeParticle(index, anchorX, anchorY) {
          const circle = svgEl("circle", { r: 1.6 + pseudoNoise(index * 1.17 + flowClock) * 1.6 });
          particleGroup.appendChild(circle);
          return {
            el: circle,
            x: anchorX !== undefined ? anchorX + (Math.random() - 0.5) * 18 : Math.random() * state.width,
            y: anchorY !== undefined ? anchorY + (Math.random() - 0.5) * 18 : Math.random() * state.height,
            vx: (Math.random() - 0.5) * 1.2,
            vy: (Math.random() - 0.5) * 1.2,
            seed: Math.random() * Math.PI * 2,
            hueOffset: Math.random() * 130 - 65,
            size: 1.3 + Math.random() * 2.1,
            emit: Math.random() * 0.14
          };
        }

        function reset(anchorX, anchorY) {
          flowClock = 0;
          trailCursor = 0;
          particles = [];
          trails = [];
          bursts = [];
          clear(trailGroup);
          clear(burstGroup);
          clear(particleGroup);
          setAttrs(halo, {
            cx: state.width * 0.52,
            cy: state.height * 0.48,
            r: Math.min(state.width, state.height) * 0.28,
            fill: themeColor(1, 0.12, state.params.hue * 90)
          });
          const particleCount = Math.round(220 + state.params.density * 280);
          const trailCount = Math.round(780 + state.params.density * 820);
          for (let i = 0; i < trailCount; i += 1) {
            const line = svgEl("line", {
              x1: 0,
              y1: 0,
              x2: 0,
              y2: 0,
              opacity: 0,
              "stroke-linecap": "round"
            });
            trailGroup.appendChild(line);
            trails.push({ el: line, life: 0, ttl: 0.7 });
          }
          for (let i = 0; i < particleCount; i += 1) {
            particles.push(makeParticle(i, anchorX, anchorY));
          }
        }

        function emitTrail(particle, x1, y1, x2, y2) {
          const trail = trails[trailCursor];
          trailCursor = (trailCursor + 1) % trails.length;
          trail.ttl = 0.42 + Math.random() * 0.26;
          trail.life = trail.ttl;
          setAttrs(trail.el, {
            x1,
            y1,
            x2,
            y2,
            stroke: themeColor(0, 0.55, state.params.hue * 160 + particle.hueOffset, 1, 0.96),
            "stroke-width": particle.size,
            opacity: 0.34
          });
        }

        function spawnBurst(x, y) {
          for (let i = 0; i < 3; i += 1) {
            const ring = svgEl("circle", {
              cx: x,
              cy: y,
              r: 3,
              fill: "none",
              opacity: 0.9,
              stroke: themeColor(i, 0.68, state.params.hue * 120 + i * 30),
              "stroke-width": 1.4 + i * 0.5
            });
            burstGroup.appendChild(ring);
            bursts.push({
              el: ring,
              x,
              y,
              life: 0.72 + i * 0.16,
              ttl: 0.72 + i * 0.16,
              radius: 4 + i * 12,
              maxRadius: 86 + i * 36
            });
          }
        }

        return {
          mount() {
            modeLayer.appendChild(root);
            reset();
          },
          unmount() {},
          reset() {
            reset();
          },
          onParamChange(key) {
            if (key === "density") {
              reset();
            }
          },
          click(x, y) {
            spawnBurst(x, y);
            for (let i = 0; i < particles.length; i += 1) {
              const particle = particles[i];
              const dx = particle.x - x;
              const dy = particle.y - y;
              const dist = Math.hypot(dx, dy) + 1;
              if (dist < 170) {
                const push = (170 - dist) * 0.035;
                particle.vx += (dx / dist) * push;
                particle.vy += (dy / dist) * push;
              }
            }
          },
          update(dt, now) {
            flowClock += dt;
            const timeScale = Math.min(2.2, dt * 60);
            const pointerX = state.pointer.inside ? state.pointer.x : state.width * 0.5 + Math.sin(now * 0.00018) * state.width * 0.08;
            const pointerY = state.pointer.inside ? state.pointer.y : state.height * 0.5 + Math.cos(now * 0.00016) * state.height * 0.08;
            const step = 1.2 + state.params.speed * 2.9;
            const pullStrength = 0.2 + state.params.speed * 0.75;

            for (let i = 0; i < particles.length; i += 1) {
              const particle = particles[i];
              const prevX = particle.x;
              const prevY = particle.y;
              const angle = flowAngle(particle.x, particle.y, flowClock * 2.2, particle.seed);
              const dx = pointerX - particle.x;
              const dy = pointerY - particle.y;
              const dist = Math.hypot(dx, dy) + 1;
              const pull = (pullStrength * 5) / Math.pow(dist / 140 + 1, 1.35);
              particle.vx = particle.vx * 0.88 + (Math.cos(angle) * step + (dx / dist) * pull) * 0.18;
              particle.vy = particle.vy * 0.88 + (Math.sin(angle) * step + (dy / dist) * pull) * 0.18;
              particle.x += particle.vx * timeScale;
              particle.y += particle.vy * timeScale;

              let wrapped = false;
              if (particle.x < -18) {
                particle.x = state.width + 18;
                wrapped = true;
              } else if (particle.x > state.width + 18) {
                particle.x = -18;
                wrapped = true;
              }
              if (particle.y < -18) {
                particle.y = state.height + 18;
                wrapped = true;
              } else if (particle.y > state.height + 18) {
                particle.y = -18;
                wrapped = true;
              }

              particle.emit -= dt;
              if (!wrapped && particle.emit <= 0) {
                emitTrail(particle, prevX, prevY, particle.x, particle.y);
                particle.emit = clamp(0.05 + Math.random() * 0.08 - state.params.speed * 0.025, 0.028, 0.12);
              }

              setAttrs(particle.el, {
                cx: particle.x,
                cy: particle.y,
                r: particle.size,
                fill: themeColor(i, 0.92, state.params.hue * 180 + particle.hueOffset, 1, 1.02)
              });
            }

            for (let i = 0; i < trails.length; i += 1) {
              const trail = trails[i];
              if (trail.life <= 0) {
                continue;
              }
              trail.life -= dt;
              trail.el.setAttribute("opacity", Math.max(0, trail.life / trail.ttl) * 0.38);
              if (trail.life <= 0) {
                trail.el.setAttribute("opacity", 0);
              }
            }

            for (let i = bursts.length - 1; i >= 0; i -= 1) {
              const burst = bursts[i];
              burst.life -= dt;
              const t = 1 - burst.life / burst.ttl;
              setAttrs(burst.el, {
                r: lerp(burst.radius, burst.maxRadius, t),
                opacity: Math.max(0, 1 - t) * 0.9
              });
              if (burst.life <= 0) {
                burst.el.remove();
                bursts.splice(i, 1);
              }
            }
          }
        };
      }

      function createTreeMode() {
        const root = svgEl("g");
        const skyGlow = svgEl("circle", { filter: "url(#glowStrong)" });
        const ground = svgEl("path");
        const branchGroup = svgEl("g", {
          "stroke-linecap": "round",
          "stroke-linejoin": "round"
        });
        const leafGroup = svgEl("g", { filter: "url(#glowSoft)" });
        root.append(skyGlow, ground, branchGroup, leafGroup);

        const branchPaths = [];
        const leafPool = [];
        let seed = Math.random() * 999;
        let originX = 0;

        for (let i = 0; i < 12; i += 1) {
          const path = svgEl("path", { fill: "none" });
          branchGroup.appendChild(path);
          branchPaths.push(path);
        }
        for (let i = 0; i < 360; i += 1) {
          const leaf = svgEl("circle", { opacity: 0 });
          leafGroup.appendChild(leaf);
          leafPool.push(leaf);
        }

        function noise(n) {
          const x = Math.sin(n * 127.1 + seed * 311.7) * 43758.5453123;
          return x - Math.floor(x);
        }

        function reset(x) {
          seed = Math.random() * 999;
          originX = x !== undefined ? x : state.width * 0.5;
          setAttrs(skyGlow, {
            cx: state.width * 0.76,
            cy: state.height * 0.2,
            r: Math.min(state.width, state.height) * 0.13,
            fill: themeColor(0, 0.24, state.params.hue * 90)
          });
          ground.setAttribute(
            "d",
            "M0 " +
              (state.height * 0.84).toFixed(1) +
              " C " +
              (state.width * 0.2).toFixed(1) +
              " " +
              (state.height * 0.8).toFixed(1) +
              ", " +
              (state.width * 0.75).toFixed(1) +
              " " +
              (state.height * 0.9).toFixed(1) +
              ", " +
              state.width.toFixed(1) +
              " " +
              (state.height * 0.82).toFixed(1)
          );
          ground.setAttribute("stroke", themeColor(2, 0.2, -20, 0.7, 0.68));
          ground.setAttribute("stroke-width", 2.4);
          ground.setAttribute("fill", "none");
        }

        return {
          mount() {
            modeLayer.appendChild(root);
            reset();
          },
          unmount() {},
          reset() {
            reset();
          },
          click(x) {
            reset(x);
          },
          update(dt, now) {
            const maxDepth = 7 + Math.round(state.params.density * 3);
            const baseAngle = 0.3 + state.params.density * 0.42;
            const trunk = state.height * (0.18 + state.params.density * 0.08);
            const trunkWidth = 14 + state.params.density * 14;
            const originY = state.height * 0.84;
            const pointerLean = state.pointer.inside ? ((state.pointer.x / state.width) - 0.5) * 0.55 : 0;
            const branchPathsData = Array.from({ length: branchPaths.length }, () => []);
            const tips = [];
            const timeBase = now * 0.001;

            function grow(x, y, length, angle, thickness, depth, phase) {
              const x2 = x + Math.cos(angle) * length;
              const y2 = y - Math.sin(angle) * length;
              branchPathsData[depth].push(
                "M" + x.toFixed(1) + "," + y.toFixed(1) + "L" + x2.toFixed(1) + "," + y2.toFixed(1)
              );
              if (depth >= maxDepth || length < 6) {
                tips.push({
                  x: x2,
                  y: y2,
                  radius: 1.8 + noise(phase * 2.2) * 2.2,
                  sway: phase
                });
                return;
              }

              const flutter = Math.sin(timeBase * (0.9 + state.params.speed * 1.8) + phase + seed) *
                (0.1 + state.params.speed * 0.25) *
                (1 - depth / (maxDepth + 1));
              const asym = noise(phase + depth * 1.7);
              const spread = baseAngle + (asym - 0.5) * 0.18;
              const lenA = length * (0.73 + asym * 0.05 - depth * 0.012);
              const lenB = length * (0.69 + (1 - asym) * 0.07 - depth * 0.008);
              const nextThickness = thickness * (0.73 - depth * 0.01);
              grow(x2, y2, lenA, angle + spread + flutter + pointerLean * 0.22, nextThickness, depth + 1, phase + 1.37);
              grow(x2, y2, lenB, angle - spread + flutter * 0.82 + pointerLean * 0.16, nextThickness, depth + 1, phase + 2.11);

              if (depth > 1 && depth < maxDepth - 1 && asym > 0.72 && state.params.density > 0.48) {
                grow(
                  x2,
                  y2,
                  length * (0.42 + asym * 0.1),
                  angle + flutter * 1.1 + (asym - 0.5) * 0.35,
                  nextThickness * 0.66,
                  depth + 1,
                  phase + 2.87
                );
              }
            }

            grow(originX, originY, trunk, Math.PI / 2 + pointerLean * 0.08, trunkWidth, 0, 0.9);

            for (let i = 0; i < branchPaths.length; i += 1) {
              const width = Math.max(1.15, trunkWidth * Math.pow(0.72, i) * (1.12 - i * 0.03));
              setAttrs(branchPaths[i], {
                d: branchPathsData[i].join(" "),
                stroke: themeColor(2, 0.75, state.params.hue * 70 - i * 6, 0.42, 0.3 + i * 0.06),
                "stroke-width": width
              });
            }

            let leafIndex = 0;
            for (let i = 0; i < tips.length && leafIndex < leafPool.length; i += 1) {
              const tip = tips[i];
              const pulse = 0.68 + Math.sin(timeBase * 1.7 + tip.sway * 1.9) * 0.22;
              const leaf = leafPool[leafIndex];
              setAttrs(leaf, {
                cx: tip.x,
                cy: tip.y,
                r: tip.radius * pulse * (1 + state.params.density * 0.16),
                fill: themeColor(i % 2, 0.78, state.params.hue * 140 + i * 4, 0.88, 1),
                opacity: 0.84
              });
              leafIndex += 1;
            }
            for (; leafIndex < leafPool.length; leafIndex += 1) {
              leafPool[leafIndex].setAttribute("opacity", 0);
            }
          }
        };
      }

      function createWavesMode() {
        const root = svgEl("g", { "mix-blend-mode": "screen" });
        const fieldGroup = svgEl("g");
        const rippleGroup = svgEl("g", { filter: "url(#glowSoft)" });
        const sourceGroup = svgEl("g", { filter: "url(#glowStrong)" });
        root.append(fieldGroup, rippleGroup, sourceGroup);

        let samples = [];
        let sources = [];

        function makeSource(x, y, phaseOffset) {
          const dot = svgEl("circle");
          sourceGroup.appendChild(dot);
          const rings = [];
          for (let i = 0; i < 5; i += 1) {
            const ring = svgEl("circle", { fill: "none" });
            rippleGroup.appendChild(ring);
            rings.push(ring);
          }
          return {
            x,
            y,
            phase: phaseOffset,
            dot,
            rings,
            born: performance.now()
          };
        }

        function clearSources() {
          while (sources.length) {
            const source = sources.pop();
            source.dot.remove();
            source.rings.forEach((ring) => ring.remove());
          }
        }

        function reset() {
          clear(fieldGroup);
          clear(rippleGroup);
          clear(sourceGroup);
          samples = [];
          sources = [];

          const step = Math.max(22, Math.min(36, Math.round(state.width / 34)));
          for (let y = step * 0.8; y < state.height; y += step) {
            for (let x = step * 0.8; x < state.width; x += step) {
              const sample = svgEl("circle", { r: 2.2 });
              fieldGroup.appendChild(sample);
              samples.push({ x, y, el: sample });
            }
          }

          sources.push(makeSource(state.width * 0.28, state.height * 0.34, 0.2));
          sources.push(makeSource(state.width * 0.68, state.height * 0.44, 1.8));
          sources.push(makeSource(state.width * 0.5, state.height * 0.68, 3.6));
        }

        function addSource(x, y) {
          sources.push(makeSource(x, y, performance.now() * 0.001));
          if (sources.length > 7) {
            const source = sources.shift();
            source.dot.remove();
            source.rings.forEach((ring) => ring.remove());
          }
        }

        return {
          mount() {
            modeLayer.appendChild(root);
            reset();
          },
          unmount() {},
          reset() {
            reset();
          },
          click(x, y) {
            addSource(x, y);
          },
          update(dt, now) {
            const time = now * 0.001;
            const waveSpeed = 3.6 + state.params.speed * 7.4;
            const frequency = 0.018 + state.params.density * 0.03;
            const pointerSource = state.pointer.inside
              ? { x: state.pointer.x, y: state.pointer.y, phase: 1.1, strength: 0.55 }
              : null;

            for (let i = 0; i < samples.length; i += 1) {
              const sample = samples[i];
              let field = 0;
              for (let j = 0; j < sources.length; j += 1) {
                const source = sources[j];
                const dx = sample.x - source.x;
                const dy = sample.y - source.y;
                const dist = Math.hypot(dx, dy) + 1;
                field += Math.sin(dist * frequency - time * waveSpeed + source.phase) / (1 + dist * 0.004);
              }
              if (pointerSource) {
                const dx = sample.x - pointerSource.x;
                const dy = sample.y - pointerSource.y;
                const dist = Math.hypot(dx, dy) + 1;
                field += pointerSource.strength * Math.sin(dist * frequency * 1.2 - time * waveSpeed * 1.4 + pointerSource.phase) / (1 + dist * 0.006);
              }
              const magnitude = Math.abs(field);
              setAttrs(sample.el, {
                cx: sample.x,
                cy: sample.y,
                r: 1.1 + magnitude * (2.5 + state.params.density * 4.4),
                fill: field >= 0
                  ? themeColor(0, 0.16 + magnitude * 0.44, state.params.hue * 160 + magnitude * 80)
                  : themeColor(1, 0.12 + magnitude * 0.4, state.params.hue * 160 - magnitude * 90),
                opacity: 0.16 + magnitude * 0.62
              });
            }

            const maxRadius = Math.hypot(state.width, state.height) * 0.58;
            for (let i = 0; i < sources.length; i += 1) {
              const source = sources[i];
              setAttrs(source.dot, {
                cx: source.x,
                cy: source.y,
                r: 3.4 + Math.sin(time * 3 + i) * 1.3,
                fill: themeColor(i, 0.92, state.params.hue * 100 + i * 22)
              });
              for (let j = 0; j < source.rings.length; j += 1) {
                const radius = ((time * (58 + state.params.speed * 90) + j * maxRadius * 0.18 + i * 24) % maxRadius);
                const fade = 1 - radius / maxRadius;
                setAttrs(source.rings[j], {
                  cx: source.x,
                  cy: source.y,
                  r: radius,
                  stroke: themeColor(i + j, fade * 0.24, state.params.hue * 130 + j * 20),
                  "stroke-width": 0.7 + fade * 2.4,
                  opacity: fade * 0.9
                });
              }
            }
          }
        };
      }

      const modes = {
        flow: createFlowMode(),
        tree: createTreeMode(),
        waves: createWavesMode()
      };

      function buildModeButtons() {
        Object.entries(modeMeta).forEach(([key, meta]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.mode = key;
          button.textContent = meta.label;
          button.addEventListener("click", () => {
            setMode(key);
          });
          modeButtonsHost.appendChild(button);
        });
      }

      function buildThemeButtons() {
        Object.entries(themes).forEach(([key, theme]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.theme = key;
          button.textContent = theme.name;
          button.addEventListener("click", () => {
            setTheme(key);
          });
          themeButtonsHost.appendChild(button);
        });
      }

      function animate(ts) {
        if (!state.lastTs) {
          state.lastTs = ts;
        }
        const dt = Math.min(0.033, (ts - state.lastTs) / 1000 || 1 / 60);
        state.lastTs = ts;
        state.time = ts;
        if (state.playing && currentMode) {
          currentMode.update(dt, ts);
        }
        requestAnimationFrame(animate);
      }

      buildModeButtons();
      buildThemeButtons();
      bindControls();
      setTheme(state.theme);
      renderSliderUI();
      updateDimensions();
      setMode(state.mode);
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
