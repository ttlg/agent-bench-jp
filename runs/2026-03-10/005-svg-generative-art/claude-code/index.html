<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Generative Art Engine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
#controls {
  width: 260px;
  min-width: 260px;
  background: #12121a;
  border-right: 1px solid #2a2a3a;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  z-index: 10;
}
#controls h2 {
  font-size: 16px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.section-label {
  font-size: 11px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}
.mode-btn {
  background: #1a1a2e;
  border: 1px solid #2a2a3a;
  color: #ccc;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  text-align: left;
}
.mode-btn:hover { background: #252540; border-color: #4a4a6a; }
.mode-btn.active { background: #2a2a5a; border-color: #6a6aff; color: #fff; }
.slider-group { display: flex; flex-direction: column; gap: 3px; }
.slider-group label {
  font-size: 12px;
  color: #888;
  display: flex;
  justify-content: space-between;
}
.slider-group label span { color: #aaf; }
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: #2a2a3a;
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: #6a6aff;
  border-radius: 50%;
  cursor: pointer;
}
.btn-row { display: flex; gap: 8px; }
.action-btn {
  flex: 1;
  background: #1a1a2e;
  border: 1px solid #2a2a3a;
  color: #ccc;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.action-btn:hover { background: #252540; border-color: #4a4a6a; }
.action-btn.active { background: #1a3a1a; border-color: #4a8a4a; color: #8f8; }
.theme-btn {
  background: #1a1a2e;
  border: 1px solid #2a2a3a;
  color: #ccc;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
  flex: 1;
}
.theme-btn:hover { background: #252540; }
.theme-btn.active { border-color: #6a6aff; color: #fff; }
#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#art-svg {
  width: 100%;
  height: 100%;
  display: block;
}
#fps-counter {
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 11px;
  color: #555;
  font-family: monospace;
}
</style>
</head>
<body>
<div id="controls">
  <h2>Generative Art</h2>

  <div class="section-label">Mode</div>
  <button class="mode-btn active" data-mode="particle">Particle Flow</button>
  <button class="mode-btn" data-mode="fractal">Fractal Tree</button>
  <button class="mode-btn" data-mode="wave">Wave Interference</button>
  <button class="mode-btn" data-mode="kaleidoscope">Kaleidoscope</button>
  <button class="mode-btn" data-mode="galaxy">Spiral Galaxy</button>

  <div class="section-label">Parameters</div>
  <div class="slider-group">
    <label id="slider1-label">Speed <span id="slider1-val">50</span></label>
    <input type="range" id="slider1" min="0" max="100" value="50">
  </div>
  <div class="slider-group">
    <label id="slider2-label">Density <span id="slider2-val">50</span></label>
    <input type="range" id="slider2" min="0" max="100" value="50">
  </div>
  <div class="slider-group">
    <label id="slider3-label">Hue <span id="slider3-val">50</span></label>
    <input type="range" id="slider3" min="0" max="100" value="50">
  </div>

  <div class="section-label">Controls</div>
  <div class="btn-row">
    <button class="action-btn active" id="btn-play">&#9654; Play</button>
    <button class="action-btn" id="btn-reset">&#8635; Reset</button>
  </div>

  <div class="section-label">Color Theme</div>
  <div class="btn-row">
    <button class="theme-btn active" data-theme="neon">Neon</button>
    <button class="theme-btn" data-theme="pastel">Pastel</button>
    <button class="theme-btn" data-theme="mono">Mono</button>
  </div>
</div>

<div id="canvas-container">
  <svg id="art-svg" xmlns="http://www.w3.org/2000/svg">
    <defs id="svg-defs"></defs>
    <rect id="bg-rect" width="100%" height="100%" fill="#0a0a0f"/>
    <g id="art-layer"></g>
  </svg>
  <div id="fps-counter">-- fps</div>
</div>

<script>
(function() {
  // --- State ---
  const state = {
    mode: 'particle',
    theme: 'neon',
    playing: true,
    width: 800,
    height: 600,
    mouse: { x: 400, y: 300, active: false },
    slider1: 50,
    slider2: 50,
    slider3: 50,
    frameId: null
  };

  const svg = document.getElementById('art-svg');
  const artLayer = document.getElementById('art-layer');
  const svgDefs = document.getElementById('svg-defs');
  const bgRect = document.getElementById('bg-rect');
  const fpsEl = document.getElementById('fps-counter');
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // --- Themes ---
  const themes = {
    neon: {
      bg: '#0a0a0f',
      colors: ['#ff006e','#fb5607','#ffbe0b','#00f5d4','#8338ec','#3a86ff'],
      accent: '#ff006e'
    },
    pastel: {
      bg: '#1a1520',
      colors: ['#ffadad','#ffd6a5','#fdffb6','#caffbf','#9bf6ff','#bdb2ff'],
      accent: '#ffadad'
    },
    mono: {
      bg: '#080808',
      colors: ['#ffffff','#cccccc','#999999','#666666','#bbbbbb','#dddddd'],
      accent: '#ffffff'
    }
  };

  function getTheme() { return themes[state.theme]; }
  function themeColor(i) {
    const c = getTheme().colors;
    return c[((i % c.length) + c.length) % c.length];
  }

  // --- Perlin Noise (simplified) ---
  const permutation = [];
  function initNoise() {
    for (let i = 0; i < 256; i++) permutation[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
    }
    for (let i = 0; i < 256; i++) permutation[256 + i] = permutation[i];
  }
  initNoise();

  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function lerp(a, b, t) { return a + t * (b - a); }
  function grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }
  function noise2D(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x), yf = y - Math.floor(y);
    const u = fade(xf), v = fade(yf);
    const aa = permutation[permutation[X] + Y];
    const ab = permutation[permutation[X] + Y + 1];
    const ba = permutation[permutation[X + 1] + Y];
    const bb = permutation[permutation[X + 1] + Y + 1];
    return lerp(lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
                lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v);
  }

  // --- SVG Helpers ---
  function createSVGEl(tag, attrs) {
    const el = document.createElementNS(SVG_NS, tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }
  function clearLayer() { artLayer.innerHTML = ''; }
  function clearDefs() { svgDefs.innerHTML = ''; }

  // --- Resize ---
  function onResize() {
    const cont = document.getElementById('canvas-container');
    state.width = cont.clientWidth;
    state.height = cont.clientHeight;
    svg.setAttribute('viewBox', `0 0 ${state.width} ${state.height}`);
  }
  window.addEventListener('resize', onResize);
  onResize();

  // --- FPS ---
  let fpsTimes = [];
  function updateFPS(now) {
    fpsTimes.push(now);
    while (fpsTimes.length > 0 && fpsTimes[0] < now - 1000) fpsTimes.shift();
    fpsEl.textContent = fpsTimes.length + ' fps';
  }

  // =====================
  // MODE: Particle Flow
  // =====================
  const particleMode = {
    particles: [],
    trails: [],
    time: 0,
    maxTrails: 1500,

    init() {
      clearLayer(); clearDefs();
      this.particles = [];
      this.trails = [];
      this.time = 0;
      const count = 150 + Math.floor(state.slider2 * 2.5);
      for (let i = 0; i < count; i++) this.spawnParticle();
    },

    spawnParticle(x, y) {
      this.particles.push({
        x: x !== undefined ? x : Math.random() * state.width,
        y: y !== undefined ? y : Math.random() * state.height,
        vx: 0, vy: 0,
        life: 1,
        color: themeColor(Math.floor(Math.random() * 6)),
        age: 0
      });
    },

    update(dt) {
      const speed = (state.slider1 / 50) * 2;
      const scale = 0.003 + (state.slider3 / 100) * 0.005;
      this.time += dt * 0.001;

      for (let i = this.particles.length - 1; i >= 0; i--) {
        const p = this.particles[i];
        const angle = noise2D(p.x * scale, p.y * scale + this.time * 0.3) * Math.PI * 4;
        p.vx = p.vx * 0.95 + Math.cos(angle) * speed * 0.5;
        p.vy = p.vy * 0.95 + Math.sin(angle) * speed * 0.5;

        if (state.mouse.active) {
          const dx = state.mouse.x - p.x, dy = state.mouse.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 1;
          if (dist < 200) {
            const force = (200 - dist) / 200 * 2;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        }

        const ox = p.x, oy = p.y;
        p.x += p.vx;
        p.y += p.vy;
        p.age += dt * 0.001;
        p.life = Math.max(0, 1 - p.age / 8);

        if (p.life > 0.05) {
          this.trails.push({ x1: ox, y1: oy, x2: p.x, y2: p.y, color: p.color, opacity: p.life * 0.6, age: 0 });
        }

        if (p.x < -20 || p.x > state.width + 20 || p.y < -20 || p.y > state.height + 20 || p.life <= 0.05) {
          this.particles[i] = {
            x: Math.random() * state.width,
            y: Math.random() * state.height,
            vx: 0, vy: 0, life: 1, color: themeColor(Math.floor(Math.random() * 6)), age: 0
          };
        }
      }

      for (let i = this.trails.length - 1; i >= 0; i--) {
        this.trails[i].age += dt * 0.001;
        this.trails[i].opacity *= 0.985;
        if (this.trails[i].opacity < 0.01) { this.trails.splice(i, 1); }
      }
      while (this.trails.length > this.maxTrails) this.trails.shift();
    },

    render() {
      clearLayer();
      const frag = document.createDocumentFragment();
      for (const t of this.trails) {
        const line = createSVGEl('line', {
          x1: t.x1, y1: t.y1, x2: t.x2, y2: t.y2,
          stroke: t.color, 'stroke-width': 1.5, 'stroke-opacity': t.opacity,
          'stroke-linecap': 'round'
        });
        frag.appendChild(line);
      }
      for (const p of this.particles) {
        const c = createSVGEl('circle', {
          cx: p.x, cy: p.y, r: 2, fill: p.color, opacity: p.life
        });
        frag.appendChild(c);
      }
      artLayer.appendChild(frag);
    },

    onClick(x, y) {
      for (let i = 0; i < 30; i++) this.spawnParticle(x, y);
    },

    sliderLabels: ['Speed', 'Count', 'Scale']
  };

  // =====================
  // MODE: Fractal Tree
  // =====================
  const fractalMode = {
    time: 0,
    branches: [],

    init() {
      clearLayer(); clearDefs();
      this.time = 0;
      this.generate();
    },

    generate() {
      this.branches = [];
      const depth = 8 + Math.floor(state.slider2 / 15);
      const baseAngle = (-90) * Math.PI / 180;
      const spread = (15 + state.slider3 * 0.4) * Math.PI / 180;
      const len = 60 + state.slider1 * 0.8;
      const cx = state.width / 2;
      const by = state.height - 40;
      this._branch(cx, by, baseAngle, len, depth, spread, 0);
    },

    _branch(x, y, angle, len, depth, spread, idx) {
      if (depth <= 0 || len < 2) return;
      const x2 = x + Math.cos(angle) * len;
      const y2 = y + Math.sin(angle) * len;
      this.branches.push({ x1: x, y1: y, x2, y2, depth, idx, baseAngle: angle });
      const ratio = 0.72;
      const newLen = len * ratio;
      this._branch(x2, y2, angle - spread, newLen, depth - 1, spread, idx * 2 + 1);
      this._branch(x2, y2, angle + spread, newLen, depth - 1, spread, idx * 2 + 2);
      if (depth > 2 && Math.random() > 0.7) {
        this._branch(x2, y2, angle + (Math.random() - 0.5) * spread * 3, newLen * 0.6, depth - 2, spread, idx * 3);
      }
    },

    update(dt) {
      this.time += dt * 0.001 * (state.slider1 / 50);
    },

    render() {
      clearLayer();
      const frag = document.createDocumentFragment();
      const maxDepth = this.branches.reduce((m, b) => Math.max(m, b.depth), 0);

      for (const b of this.branches) {
        const wind = Math.sin(this.time * 1.5 + b.x2 * 0.005) * (maxDepth - b.depth + 1) * 1.2;
        const mx = state.mouse.active ? (state.mouse.x - state.width / 2) * 0.003 * (maxDepth - b.depth) : 0;
        const sw = Math.max(0.5, b.depth * 0.8);
        const t = 1 - b.depth / (maxDepth + 1);
        const color = themeColor(Math.floor(t * 5));
        const line = createSVGEl('line', {
          x1: b.x1 + wind * 0.3 + mx * 0.3, y1: b.y1,
          x2: b.x2 + wind + mx, y2: b.y2,
          stroke: color, 'stroke-width': sw,
          'stroke-linecap': 'round', opacity: 0.5 + t * 0.5
        });
        frag.appendChild(line);

        if (b.depth <= 2) {
          const leaf = createSVGEl('circle', {
            cx: b.x2 + wind + mx, cy: b.y2,
            r: 2 + Math.sin(this.time * 2 + b.idx) * 1,
            fill: themeColor(Math.floor(Math.random() * 3)),
            opacity: 0.6 + Math.sin(this.time + b.idx * 0.5) * 0.3
          });
          frag.appendChild(leaf);
        }
      }
      artLayer.appendChild(frag);
    },

    onClick() { this.generate(); },
    sliderLabels: ['Speed', 'Depth', 'Angle']
  };

  // =====================
  // MODE: Wave Interference
  // =====================
  const waveMode = {
    sources: [],
    time: 0,
    gridCircles: [],

    init() {
      clearLayer(); clearDefs();
      this.sources = [
        { x: state.width * 0.3, y: state.height * 0.4 },
        { x: state.width * 0.7, y: state.height * 0.6 }
      ];
      this.time = 0;
      this.buildGrid();
    },

    buildGrid() {
      this.gridCircles = [];
      const spacing = 12 + Math.floor((100 - state.slider2) / 8);
      for (let x = 0; x < state.width; x += spacing) {
        for (let y = 0; y < state.height; y += spacing) {
          this.gridCircles.push({ x, y });
        }
      }
    },

    update(dt) {
      this.time += dt * 0.001 * (state.slider1 / 30);
    },

    render() {
      clearLayer();
      const frag = document.createDocumentFragment();
      const freq = 0.02 + state.slider3 * 0.0005;
      const colors = getTheme().colors;

      for (const pt of this.gridCircles) {
        let val = 0;
        for (const s of this.sources) {
          const dx = pt.x - s.x, dy = pt.y - s.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          val += Math.sin(dist * freq - this.time * 3);
        }
        val /= this.sources.length;
        const norm = (val + 1) / 2;
        const ci = Math.floor(norm * (colors.length - 1));
        const r = 2 + norm * 4;
        const c = createSVGEl('circle', {
          cx: pt.x, cy: pt.y, r: r,
          fill: colors[ci], opacity: 0.3 + norm * 0.6
        });
        frag.appendChild(c);
      }

      for (const s of this.sources) {
        const ring = createSVGEl('circle', {
          cx: s.x, cy: s.y, r: 8,
          fill: 'none', stroke: getTheme().accent, 'stroke-width': 2, opacity: 0.8
        });
        frag.appendChild(ring);
      }
      artLayer.appendChild(frag);
    },

    onClick(x, y) {
      if (this.sources.length >= 8) this.sources.shift();
      this.sources.push({ x, y });
    },

    sliderLabels: ['Speed', 'Density', 'Frequency']
  };

  // =====================
  // MODE: Kaleidoscope
  // =====================
  const kaleidoscopeMode = {
    time: 0,
    shapes: [],

    init() {
      clearLayer(); clearDefs();
      this.time = 0;
      this.shapes = [];
      const count = 30 + Math.floor(state.slider2 * 0.5);
      for (let i = 0; i < count; i++) {
        this.shapes.push({
          angle: Math.random() * Math.PI * 2,
          dist: 20 + Math.random() * 200,
          size: 3 + Math.random() * 15,
          speed: (Math.random() - 0.5) * 2,
          colorIdx: Math.floor(Math.random() * 6),
          phase: Math.random() * Math.PI * 2
        });
      }
    },

    update(dt) {
      this.time += dt * 0.001 * (state.slider1 / 50);
    },

    render() {
      clearLayer();
      const cx = state.width / 2, cy = state.height / 2;
      const segments = 6 + Math.floor(state.slider3 / 15);
      const segAngle = (Math.PI * 2) / segments;
      const frag = document.createDocumentFragment();

      const mx = state.mouse.active ? state.mouse.x - cx : 0;
      const my = state.mouse.active ? state.mouse.y - cy : 0;
      const mouseAngle = Math.atan2(my, mx);
      const mouseDist = Math.sqrt(mx * mx + my * my);

      for (const shape of this.shapes) {
        const a = shape.angle + this.time * shape.speed * 0.3;
        const d = shape.dist + Math.sin(this.time + shape.phase) * 20;
        const mInfluence = state.mouse.active ? mouseDist * 0.1 : 0;
        const mAngleInf = state.mouse.active ? mouseAngle * 0.2 : 0;

        for (let s = 0; s < segments; s++) {
          const baseAngle = s * segAngle;
          const mirror = s % 2 === 0 ? 1 : -1;
          const finalAngle = baseAngle + (a + mAngleInf) * mirror;
          const finalDist = d + mInfluence * Math.sin(s + this.time);

          const px = cx + Math.cos(finalAngle) * finalDist;
          const py = cy + Math.sin(finalAngle) * finalDist;
          const sz = shape.size * (0.8 + Math.sin(this.time * 2 + shape.phase) * 0.3);

          const el = createSVGEl('circle', {
            cx: px, cy: py, r: sz,
            fill: themeColor(shape.colorIdx),
            opacity: 0.4 + Math.sin(this.time + shape.phase) * 0.2
          });
          frag.appendChild(el);
        }
      }
      artLayer.appendChild(frag);
    },

    onClick() { this.init(); },
    sliderLabels: ['Speed', 'Elements', 'Symmetry']
  };

  // =====================
  // MODE: Spiral Galaxy
  // =====================
  const galaxyMode = {
    stars: [],
    time: 0,

    init() {
      clearLayer(); clearDefs();
      this.time = 0;
      this.stars = [];
      const count = 200 + Math.floor(state.slider2 * 4);
      const arms = 3 + Math.floor(state.slider3 / 25);
      const PHI = (1 + Math.sqrt(5)) / 2;

      for (let i = 0; i < count; i++) {
        const arm = i % arms;
        const armAngle = (arm / arms) * Math.PI * 2;
        const t = (i / count);
        const r = t * Math.min(state.width, state.height) * 0.42;
        const spiralAngle = armAngle + t * Math.PI * 3;
        const scatter = (Math.random() - 0.5) * 30 * t;
        const scatterY = (Math.random() - 0.5) * 30 * t;

        // Spectral color based on distance from center
        const temp = 0.3 + t * 0.7;  // 0=hot blue, 1=cool red
        let sr, sg, sb;
        if (temp < 0.33) {
          sr = 150 + temp * 300; sg = 180 + temp * 200; sb = 255;
        } else if (temp < 0.66) {
          sr = 255; sg = 255 - (temp - 0.33) * 400; sb = 200 - (temp - 0.33) * 500;
        } else {
          sr = 255; sg = 100 - (temp - 0.66) * 200; sb = 50;
        }

        this.stars.push({
          baseAngle: spiralAngle,
          dist: r,
          scatterX: scatter,
          scatterY: scatterY,
          size: 0.5 + Math.random() * 2.5,
          brightness: 0.3 + Math.random() * 0.7,
          spectralColor: `rgb(${Math.floor(Math.max(0,Math.min(255,sr)))},${Math.floor(Math.max(0,Math.min(255,sg)))},${Math.floor(Math.max(0,Math.min(255,sb)))})`,
          colorIdx: Math.floor(Math.random() * 6),
          twinklePhase: Math.random() * Math.PI * 2,
          fibIdx: i
        });
      }
    },

    update(dt) {
      this.time += dt * 0.001 * (state.slider1 / 50) * 0.5;
    },

    render() {
      clearLayer();
      const cx = state.width / 2, cy = state.height / 2;
      const frag = document.createDocumentFragment();

      // Core glow
      const coreGrad = createSVGEl('radialGradient', { id: 'core-glow', cx: '50%', cy: '50%', r: '50%' });
      const s1 = createSVGEl('stop', { offset: '0%', 'stop-color': getTheme().accent, 'stop-opacity': '0.3' });
      const s2 = createSVGEl('stop', { offset: '100%', 'stop-color': getTheme().accent, 'stop-opacity': '0' });
      coreGrad.appendChild(s1); coreGrad.appendChild(s2);
      clearDefs();
      svgDefs.appendChild(coreGrad);

      const core = createSVGEl('circle', {
        cx, cy, r: 60 + Math.sin(this.time) * 5,
        fill: 'url(#core-glow)'
      });
      frag.appendChild(core);

      const mx = state.mouse.active ? (state.mouse.x - cx) * 0.0005 : 0;
      const my = state.mouse.active ? (state.mouse.y - cy) * 0.0005 : 0;

      for (const star of this.stars) {
        const rotSpeed = 0.3 / (star.dist / 100 + 1);
        const angle = star.baseAngle + this.time * rotSpeed + mx * star.dist + my * star.dist;
        const x = cx + Math.cos(angle) * star.dist + star.scatterX;
        const y = cy + Math.sin(angle) * star.dist + star.scatterY;
        const twinkle = 0.5 + Math.sin(this.time * 3 + star.twinklePhase) * 0.5;
        const useThemeColor = state.theme !== 'neon';
        const color = useThemeColor ? themeColor(star.colorIdx) : star.spectralColor;

        const el = createSVGEl('circle', {
          cx: x, cy: y, r: star.size * (0.8 + twinkle * 0.4),
          fill: color, opacity: star.brightness * twinkle
        });
        frag.appendChild(el);
      }
      artLayer.appendChild(frag);
    },

    onClick() { this.init(); },
    sliderLabels: ['Speed', 'Stars', 'Arms']
  };

  // --- Mode Registry ---
  const modes = {
    particle: particleMode,
    fractal: fractalMode,
    wave: waveMode,
    kaleidoscope: kaleidoscopeMode,
    galaxy: galaxyMode
  };

  function currentMode() { return modes[state.mode]; }

  // --- UI Bindings ---
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      updateSliderLabels();
      currentMode().init();
    });
  });

  function updateSliderLabels() {
    const labels = currentMode().sliderLabels || ['Speed', 'Density', 'Hue'];
    document.getElementById('slider1-label').firstChild.textContent = labels[0] + ' ';
    document.getElementById('slider2-label').firstChild.textContent = labels[1] + ' ';
    document.getElementById('slider3-label').firstChild.textContent = labels[2] + ' ';
  }

  ['slider1', 'slider2', 'slider3'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      state[id] = parseInt(el.value);
      document.getElementById(id + '-val').textContent = el.value;
    });
  });

  document.getElementById('btn-play').addEventListener('click', function() {
    state.playing = !state.playing;
    this.textContent = state.playing ? '\u25B6 Play' : '\u23F8 Pause';
    this.classList.toggle('active', state.playing);
    if (state.playing) requestAnimationFrame(loop);
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    currentMode().init();
  });

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.theme = btn.dataset.theme;
      bgRect.setAttribute('fill', getTheme().bg);
      document.body.style.background = getTheme().bg;
    });
  });

  // --- Mouse/Touch ---
  const cont = document.getElementById('canvas-container');
  function getPos(e) {
    const rect = cont.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) / rect.width * state.width,
      y: (clientY - rect.top) / rect.height * state.height
    };
  }

  cont.addEventListener('mousemove', e => {
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y; state.mouse.active = true;
  });
  cont.addEventListener('mouseleave', () => { state.mouse.active = false; });
  cont.addEventListener('click', e => {
    const p = getPos(e);
    if (currentMode().onClick) currentMode().onClick(p.x, p.y);
  });
  cont.addEventListener('touchmove', e => {
    e.preventDefault();
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y; state.mouse.active = true;
  }, { passive: false });
  cont.addEventListener('touchstart', e => {
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y; state.mouse.active = true;
    if (currentMode().onClick) currentMode().onClick(p.x, p.y);
  });
  cont.addEventListener('touchend', () => { state.mouse.active = false; });

  // --- Main Loop ---
  let lastTime = 0;
  function loop(timestamp) {
    if (!state.playing) return;
    const dt = lastTime ? Math.min(timestamp - lastTime, 50) : 16;
    lastTime = timestamp;

    currentMode().update(dt);
    currentMode().render();
    updateFPS(timestamp);

    state.frameId = requestAnimationFrame(loop);
  }

  // --- Start ---
  updateSliderLabels();
  currentMode().init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
